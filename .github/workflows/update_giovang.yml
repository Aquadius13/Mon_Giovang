name: 🔄 Auto Update GioVang IPTV

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:
    inputs:
      no_stream:
        description: "Không crawl stream"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  update-iptv:
    name: 📡 Crawl giovang.vin → Push JSON
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: 📦 Install dependencies
        run: pip install cloudscraper requests
            python -m pip install --upgrade pip
            pip install cloudscraper requests pillow

      - name: 🕷️ Crawl giovang.vin
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          FLAG=""
          [ "${{ github.event.inputs.no_stream }}" = "true" ] && FLAG="--no-stream"
          python crawler_giovang_v4.py --output giovang_iptv.json $FLAG

      - name: ✅ Validate JSON
        run: |
          python3 -c "
          import json, sys
          with open('giovang_iptv.json', encoding='utf-8') as f:
              data = json.load(f)
          total = sum(len(g.get('channels',[])) for g in data.get('groups',[]))
          print(f'✅ JSON OK: {total} trận')
          if total == 0:
              print('⚠ 0 trận — kiểm tra API')
              sys.exit(1)
          "

      - name: 📤 Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          COUNT=$(python3 -c "
          import json
          with open('giovang_iptv.json') as f:
              d = json.load(f)
          print(sum(len(g.get('channels',[])) for g in d.get('groups',[])))
          ")
          git add giovang_iptv.json
          git diff --staged --quiet && echo "Không thay đổi" && exit 0
          NOW=$(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M')
          git commit -m "🔄 Update ${COUNT} trận — ${NOW} ICT"
          git push

      - name: 📊 Summary
        if: always()
        run: |
          echo "## 📡 GioVang IPTV" >> $GITHUB_STEP_SUMMARY
          COUNT=$(python3 -c "
          import json
          try:
              with open('giovang_iptv.json') as f:
                  d = json.load(f)
              print(sum(len(g.get('channels',[])) for g in d.get('groups',[])))
          except: print('?')
          " 2>/dev/null)
          echo "- **Trận:** ${COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Cập nhật:** $(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M ICT')" >> $GITHUB_STEP_SUMMARY
          REPO="${{ github.repository }}"
          echo "- **URL:** \`https://raw.githubusercontent.com/${REPO}/main/giovang_iptv.json\`" >> $GITHUB_STEP_SUMMARY
