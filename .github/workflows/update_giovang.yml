name: 🔄 Auto Update GioVang IPTV

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:
    inputs:
      no_stream:
        description: "Khong crawl stream"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      all_matches:
        description: "Lay toan bo tran"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  update-iptv:
    name: Crawl giovang.vin
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install cloudscraper requests pillow

      - name: Crawl giovang.vin
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          PYTHONUNBUFFERED: "1"
        run: |
          FLAGS=""
          if [ "${{ github.event.inputs.no_stream }}" = "true" ]; then
            FLAGS="$FLAGS --no-stream"
          fi
          if [ "${{ github.event.inputs.all_matches }}" = "true" ]; then
            FLAGS="$FLAGS --all"
          fi
          python crawler_giovang_v4.py --output giovang_iptv.json $FLAGS

      - name: Validate JSON
        run: |
          python3 - << 'PYEOF'
          import json, sys
          with open('giovang_iptv.json', encoding='utf-8') as f:
              data = json.load(f)
          total = sum(len(g.get('channels', [])) for g in data.get('groups', []))
          print(f'JSON OK: {total} tran')
          if total == 0:
              print('0 tran - kiem tra API')
              sys.exit(1)
          PYEOF

      - name: Commit and Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          python3 - << 'PYEOF'
          import json
          with open('giovang_iptv.json') as f:
              d = json.load(f)
          count = sum(len(g.get('channels', [])) for g in d.get('groups', []))
          print(count)
          PYEOF

          COUNT=$(python3 -c "
          import json
          with open('giovang_iptv.json') as f:
              d = json.load(f)
          print(sum(len(g.get('channels', [])) for g in d.get('groups', [])))
          ")

          THUMB_COUNT=0
          if [ -d thumbnails ]; then
            THUMB_COUNT=$(find thumbnails -name '*.webp' 2>/dev/null | wc -l)
          fi

          git add giovang_iptv.json
          if [ -d thumbnails ]; then
            git add thumbnails/
          fi

          if git diff --staged --quiet; then
            echo "Khong co thay doi"
            exit 0
          fi

          NOW=$(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M')
          git commit -m "Update ${COUNT} tran ${THUMB_COUNT} thumbs ${NOW} ICT"
          git push

      - name: Summary
        if: always()
        run: |
          echo "## GioVang IPTV" >> $GITHUB_STEP_SUMMARY
          COUNT=$(python3 -c "
          import json
          try:
              with open('giovang_iptv.json') as f:
                  d = json.load(f)
              print(sum(len(g.get('channels',[])) for g in d.get('groups',[])))
          except:
              print('?')
          " 2>/dev/null || echo "?")
          THUMB=0
          if [ -d thumbnails ]; then
            THUMB=$(find thumbnails -name '*.webp' 2>/dev/null | wc -l)
          fi
          echo "- Tong tran: ${COUNT}" >> $GITHUB_STEP_SUMMARY
          echo "- Thumbnails: ${THUMB} WEBP" >> $GITHUB_STEP_SUMMARY
          echo "- Cap nhat: $(TZ='Asia/Ho_Chi_Minh' date '+%d/%m/%Y %H:%M ICT')" >> $GITHUB_STEP_SUMMARY
          REPO="${{ github.repository }}"
          echo "- URL: https://raw.githubusercontent.com/${REPO}/main/giovang_iptv.json" >> $GITHUB_STEP_SUMMARY
